<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
      background-color: white;
    }
  </style>
</head>

<body>
  <model-viewer
  src="left ventricle.glb"
  camera-controls
  min-camera-orbit="-10deg 50deg auto"
  max-camera-orbit="60deg 100deg auto"
  shadow-intensity="1">
</model-viewer>
</body>
</html>
