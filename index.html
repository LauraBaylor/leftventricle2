<!DOCTYPE html>
<html>
<head>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>

<model-viewer
  src="left ventricle.glb"
  camera-controls
  autoplay
  camera-orbit="0deg 75deg 0.6m"
  min-camera-orbit="-45deg 45deg 0.35m"
  max-camera-orbit="45deg 100deg 1.2m"
  field-of-view="25deg"
  min-field-of-view="15deg"
  max-field-of-view="40deg">
  shadow-intensity="1"
  style="width:100%; height:100vh;">

</model-viewer>

</body>
</html>
