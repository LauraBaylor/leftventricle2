<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
      background-color: white;
    }
  </style>
</head>

<body>
  <model-viewer
    src="left ventricle.glb"
    camera-controls
    autoplay
camera-target="auto auto auto"
camera-orbit="0deg 75deg auto"
    min-camera-orbit="-45deg 45deg 0.35m"
    max-camera-orbit="45deg 100deg 1.2m"
    shadow-intensity="1">
  </model-viewer>
</body>
</html>
